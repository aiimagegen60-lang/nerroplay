<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NERROPLAY | Educational AI Tools & Precision Calculators</title>
    <meta name="description" content="NERROPLAY is a trusted educational platform providing algorithmic AI tools for Health, Finance, Beauty, and Smart Living. Verified calculations and expert insights." />
    <meta name="keywords" content="NERROPLAY, AI tools, BMI calculator, Finance calculators, AI beauty analysis, educational SaaS" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nerroplay.online/" />
    <meta property="og:title" content="NERROPLAY | Educational AI Tools & Precision Calculators" />
    <meta property="og:description" content="Access trustworthy AI-powered educational tools across health, finance, and lifestyle. Algorithmic transparency and expert-reviewed content." />
    <meta property="og:image" content="https://nerroplay.online/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://nerroplay.online/" />
    <meta property="twitter:title" content="NERROPLAY | Educational AI Tools & Precision Calculators" />
    <meta property="twitter:description" content="Access trustworthy AI-powered educational tools across health, finance, and lifestyle." />
    <meta property="twitter:image" content="https://nerroplay.online/og-image.png" />

    <meta name="robots" content="index, follow" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NERROPLAY",
      "alternateName": "Nerroplay AI",
      "url": "https://nerroplay.online/",
      "description": "Educational AI SaaS platform for health, finance, and lifestyle tools.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://nerroplay.online/tools?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Global error tracker for debugging Vercel/Production "Blank Screen" issues
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = '<div style="padding: 20px; font-family: monospace; color: #ff5555; background: #111; min-height: 100vh;">' +
            '<h3>CRITICAL_INTERFACE_FAULT</h3>' +
            '<p>The neural link failed to initialize.</p>' +
            '<pre style="white-space: pre-wrap;">' + msg + '\n' + (error ? error.stack : '') + '</pre>' +
            '<button onclick="location.reload()" style="background: white; color: black; border: none; padding: 10px 20px; cursor: pointer;">RETRY_SYNC</button>' +
            '</div>';
        }
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
